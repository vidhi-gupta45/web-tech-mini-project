<!DOCTYPE html>
<html>
<head>
    <title>Travel Enquiry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🌍 Travel Enquiry</h1>

    <div class="filters">
        <select id="locationFilter">
            <option value="all">All Locations</option>
            <option value="beach">Beach</option>
            <option value="mountain">Mountain</option>
        </select>

        <select id="budgetFilter">
            <option value="all">All Budgets</option>
            <option value="low">Below ₹10,000</option>
            <option value="high">Above ₹10,000</option>
        </select>

        <button onclick="filterTrips()">Search</button>
    </div>

    <div id="tripsContainer" class="container"></div>

    <script src="script.js"></script>
</body>
</html>
